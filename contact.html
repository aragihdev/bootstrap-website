<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineList - Boostrap Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="icon" href="images/icon.png">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="bi bi-film"></i> CineList</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Movies</a></li>
                    <li class="nav-item"><a class="nav-link" href="aboutus.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-3">
        <h3 style="color: white; margin-bottom: 40px; text-align: center;">Contato</h3>
        <form class="row g-3 justify-content-center">
            <div class="col-md-6 col-sm-12">
                <div class="form-floating">
                    <input type="text" name="name" id="name" class="form-control" placeholder="Full name" required>
                    <label for="name">Full name</label>
                </div>
            </div>
            <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <input type="text" name="password" id="password" class="form-control" placeholder="password">
                    <label for="name">Password</label>
                </div>
            </div>
            <div class="col-md-5 col-sm-12">
                <div class="form-floating">
                    <input type="date" name="data" id="data" class="form-control" placeholder="data" required>
                    <label for="name">Date of Birth</label>
                </div>
            </div>
            <div class="col-md-5 col-sm-12">
                <div class="form-floating">
                    <select name="category" id="category" class="form-select">
                        <option value="" selected disabled>Select</option>
                        <option value="movie_enthusiast">Auteurist Critic</option>
                        <option value="movie_enthusiast">Movie Enthusiast</option>
                        <option value="movie_enthusiast">Genre Specialist</option>
                        <option value="movie_enthusiast">Movie Curator</option>
                    </select>
                </div>
            </div>
            <div class="col-md-10 col-sm-12">
                <label class="form-label d-block">Type</label>
                <div class="form-check form-check-inline">
                    <input type="radio" name="type" id="aluno" class="form-check-input" required>
                    <label for="aluno" class="form-check-label">Student</label>
                </div>
                <div class="form-check form-check-inline">
                    <input type="radio" name="type" id="professor" class="form-check-input">
                    <label for="professor" class="form-check-label">Professor</label>
                </div>
            </div>
            <div class="col-md-10 col-sm-12">
                <div class="form-check">
                    <input type="checkbox" name="terms" id="terms" class="form-check-input" required>
                    <label for="terms">I read and accept the terms.</label>
                </div>
            </div>
            <div class="col-md-10 col-sm-12">
                <button type="submit" class="btn btn-success col-sm-12">Submit</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
