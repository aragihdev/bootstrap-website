<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FearMap - Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="icon" href="images/logo2.png">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: rgb(32, 32, 32);">
        <div class="container-fluid col-12 col-md-5">
            <a class="navbar-brand" href="index.html"><img src="images/logo.png" style="width: 200px;"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Movies</a></li>
                    <li class="nav-item"><a class="nav-link active" href="new-movie.html">Add New</a></li>
                    <li class="nav-item"><a class="nav-link" href="aboutus.html">About Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-3">

        <h2 style="margin-top: 50px; margin-bottom: 20px; text-align: center;">Add Movie</h2>
        <form class="row g-3 justify-content-center">
            <div class="col-md-6 col-sm-12">
                <div class="form-floating">
                    <input type="text" name="movie" id="movie" class="form-control" placeholder="Movie Name" required>
                    <label for="name">Movie Name</label>
                </div>
            </div>

            <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <input type="number" step="1" min="0" max="18" name="age" id="age" class="form-control" placeholder="Age Rating" required>
                    <label for="name">Age Rating</label>
                </div>
            </div>

            <div class="col-md-5 col-sm-12">
                <div class="form-floating">
                    <input type="number" step="5" min="60" max="240" name="duration" id="duration" class="form-control" placeholder="Duration" required>
                    <label for="name">Duration (minutes)</label>
                </div>
            </div>

            <div class="col-md-5 col-sm-12">
                <div class="form-floating">
                    <select name="genre" id="genre" class="form-select" required>
                        <option value="" selected disabled>Select an option</option>
                        <option value="action">Gore</option>
                        <option value="drana">Slasher</option>
                        <option value="horror">Psychological</option>
                        <option value="romance">Religious</option>
                        <option value="sci-fi">Sci-Fi</option>
                    </select>
                    <label for="categoria">Horror Genre</label>
                </div>
            </div>

            <div class="col-md-10 col-sm-12">
                <label class="form-label d-block">Produced in</label>

                <div class="form-check form-check-inline">
                    <input type="radio" name="produced" value="USA" class="form-check-input" required>
                    <label class="form-check-label">USA</label>
                </div>

                <div class="form-check form-check-inline">
                    <input type="radio" name="produced" value="UK" class="form-check-input">
                    <label class="form-check-label">UK</label>
                </div>

                <div class="form-check form-check-inline">
                    <input type="radio" name="produced" value="Brazil" class="form-check-input">
                    <label class="form-check-label">Brazil</label>
                </div>
            </div>

            <div class="col-md-10 col-sm-12">
                <button type="submit" class="btn btn-success col-sm-12">Submit</button>
            </div>
        </form>
    </div>
    <footer style="text-align: center; background-color: rgb(26,26,26); color: white; padding-bottom: 10px; margin-top: 300px;">
        <p>Copyright &copy; 2026 aragihdev & davigregnanim. All Rights Reserved</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
