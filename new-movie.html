    <div class="container mt-3" style="margin-bottom: 250px;">

        <h2 style="margin-top: 50px; margin-bottom: 20px; text-align: center;">Add Movie</h2>
        <form class="row g-3 justify-content-center">
            <div class="col-md-6 col-sm-12">
                <div class="form-floating">
                    <input type="text" name="movie" id="movie" class="form-control" placeholder="Movie Name" required>
                    <label for="name">Movie Name</label>
                </div>
            </div>

            <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <input type="number" step="1" min="0" max="18" name="age" id="age" class="form-control" placeholder="Age Rating" required>
                    <label for="name">Age Rating</label>
                </div>
            </div>

            <div class="col-md-5 col-sm-12">
                <div class="form-floating">
                    <input type="number" step="5" min="60" max="240" name="duration" id="duration" class="form-control" placeholder="Duration" required>
                    <label for="name">Duration (minutes)</label>
                </div>
            </div>

            <div class="col-md-5 col-sm-12">
                <div class="form-floating">
                    <select name="genre" id="genre" class="form-select" required>
                        <option value="" selected disabled>Select an option</option>
                        <option value="action">Gore</option>
                        <option value="drana">Slasher</option>
                        <option value="horror">Psychological</option>
                        <option value="romance">Religious</option>
                        <option value="sci-fi">Sci-Fi</option>
                    </select>
                    <label for="categoria">Horror Genre</label>
                </div>
            </div>

            <div class="col-md-10 col-sm-12">
                <label class="form-label d-block">Produced in</label>

                <div class="form-check form-check-inline">
                    <input type="radio" name="produced" value="USA" class="form-check-input" required>
                    <label class="form-check-label">USA</label>
                </div>

                <div class="form-check form-check-inline">
                    <input type="radio" name="produced" value="UK" class="form-check-input">
                    <label class="form-check-label">UK</label>
                </div>

                <div class="form-check form-check-inline">
                    <input type="radio" name="produced" value="Brazil" class="form-check-input">
                    <label class="form-check-label">Brazil</label>
                </div>
            </div>

            <div class="col-md-10 col-sm-12">
                <button type="submit" class="btn btn-success col-sm-12">Submit</button>
            </div>
        </form>
    </div>
    <footer class="bg-dark text-light mt-4 p-4">
        <div class="container">
            <div class="row">

                        width="100%" height="200" style="border:0;" allowfullscreen="" loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade">></iframe>
